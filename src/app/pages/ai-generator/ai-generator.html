<div class="container">
  <div class="ai-gen-card">
    <div class="text-center">
      <h1 class="centered-heading">Magic AI Generator</h1>
      <p class="mt-2" style="color: #64748b; font-size: 1.1rem;">
        Type any topic, and our "Magic AI" will build a custom quiz for you!
      </p>
    </div>

    <div class="mt-2" style="max-width: 600px; margin: 3rem auto;">
      <div class="form-group">
        <label class="form-label">What should the quiz be about?</label>
        <div class="search-input-wrapper">
          <input 
            type="text" 
            class="form-control pin-input" 
            [(ngModel)]="topic" 
            placeholder="e.g. Quantum Physics, Harry Potter, World War II"
            style="width: 100%; text-align: left; padding-left: 2rem;"
            [disabled]="isGenerating"
          >
        </div>
      </div>

      <button 
        class="btn-bubble mt-2" 
        style="width: 100%;" 
        (click)="generateQuiz()"
        [disabled]="!topic || isGenerating"
      >
        {{ isGenerating ? 'Casting Spell...' : 'Generate Magic Quiz' }}
      </button>
    </div>

    <!-- Generating State -->
    <div *ngIf="isGenerating" class="text-center mt-2">
      <div class="magic-loader">
        <i class="fa fa-sparkles fa-spin" style="font-size: 4rem; color: var(--accent-purple);"></i>
      </div>
      <p class="mt-2">Connecting to Knowledge Base...</p>
    </div>

    <!-- Generated Result -->
    <div *ngIf="generatedQuiz && !isGenerating" class="generated-result mt-2">
      <div class="quiz-card" style="border: 2px dashed var(--accent-purple);">
        <div class="quiz-content">
          <h3><i class="fa fa-magic"></i> {{ generatedQuiz.title }}</h3>
          <p>Generated 3 high-quality questions based on your topic.</p>
          <div class="mt-2">
            <button class="btn-bubble" (click)="saveAndPlay()">Save & Add to Library</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<style>
.ai-gen-card {
  background: white;
  padding: 4rem;
  border-radius: 40px;
  box-shadow: 0 20px 50px rgba(99, 102, 241, 0.1);
  border: 1px solid #eef2ff;
}

.magic-loader {
  padding: 2rem;
  animation: float 2s ease-in-out infinite;
}

@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-20px); }
  100% { transform: translateY(0px); }
}

.generated-result {
  animation: slideUp 0.5s ease-out;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
